# ---------------------------------------------------------------------------
# MySQL connection settings.
# Create the schema first (see sql/schema.sql), then update credentials below.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/txdemo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Make transaction-related logging visible in the console so you can watch
# Spring create, suspend, resume, commit, and roll back transactions.
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG

server.port=8080
